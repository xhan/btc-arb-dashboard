<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚合报价看板 3.0</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --module-bg-color: #ffffff;
            --text-color: #1a202c;
            --text-color-light: #4a5568;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --highlight-bg: #fff5f5;
            --highlight-border: #c53030;
            --highlight-past-bg: #fffae0; 
            --highlight-past-border: #ecc94b; 
            
            --button-hover-bg: #edf2f7;
            --button-hover-text: #2d3748;
            --info-banner-bg: #ebf8ff;
            --info-banner-border: #90cdf4;
            --info-banner-text: #2c5282;
            --error-color: #c53030;
            
            --trend-up-bg: #48bb78;       
            --trend-up-text: #ffffff;     
            --trend-down-bg: #f56565;     
            --trend-down-text: #ffffff;   
            
            --popover-bg: #2d3748;
            --popover-text: #ffffff;
            --header-bg: rgba(255, 255, 255, 0.95);
            --header-border: #e2e8f0;
            --drag-placeholder-bg: #e2e8f0;
        }

        body.dark-mode {
            --bg-color: #1a202c;
            --module-bg-color: #2d3748;
            --text-color: #f7fafc;
            --text-color-light: #a0aec0;
            --border-color: #4a5568;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --highlight-bg: #4c3030;
            --highlight-border: #e53e3e;
            --highlight-past-bg: #423e28; 
            --highlight-past-border: #d69e2e;
            
            --button-hover-bg: #4a5568;
            --button-hover-text: #ffffff;
            --info-banner-bg: #2a4365;
            --info-banner-border: #4299e1;
            --info-banner-text: #bee3f8;
            --error-color: #fc8181;
            
            --trend-up-bg: #2f855a; 
            --trend-up-text: #ffffff; 
            --trend-down-bg: #9b2c2c; 
            --trend-down-text: #ffffff; 
            
            --popover-bg: #4a5568;
            --popover-text: #ffffff;
            --header-bg: rgba(45, 55, 72, 0.95);
            --header-border: #4a5568;
            --drag-placeholder-bg: #4a5568;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            margin: 0; 
            padding: 80px 20px 20px 20px; 
            transition: background-color 0.3s, color 0.3s;
        }
        h2 { margin: 0; color: var(--text-color); }
        
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--header-border);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-sizing: border-box;
            z-index: 2000;
            box-shadow: 0 1px 3px var(--shadow-color);
        }
        
        #top-bar-left { display: flex; align-items: center; gap: 20px; }
        #top-bar-right { display: flex; align-items: center; gap: 15px; }
        #toggle-arb-btn, #toggle-calc-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        #toggle-arb-btn:hover, #toggle-calc-btn:hover { background-color: rgba(0,0,0,0.05); }
        .dark-mode #toggle-arb-btn:hover, .dark-mode #toggle-calc-btn:hover { background-color: rgba(255,255,255,0.08); }

        #dashboard { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); 
            gap: 15px; 
        }
        .module { 
            background-color: var(--module-bg-color); 
            border-radius: 12px; 
            box-shadow: 0 4px 12px var(--shadow-color); 
            padding: 20px; 
            display: flex; flex-direction: column; 
            transition: background-color 0.3s;
            overflow: hidden;
        }
        .module-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 5px; }
        
        .icon-btn { 
            background: none; border: none; cursor: pointer;
            color: var(--text-color-light); 
            padding: 5px;
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 20px;
            width: 28px;
            height: 28px;
            transition: background-color 0.2s, color 0.2s;
            flex-shrink: 0; 
        }

        .icon-btn:hover { background-color: var(--button-hover-bg); color: var(--button-hover-text); }
        .delete-btn { background: #fee2e2; color: #c53030; font-weight: bold; }
        .delete-btn:hover { background-color: #fecaca; }
        .dismiss-highlight-btn { background-color: #ebf4ff; color: #3182ce; font-weight: bold; font-size: 16px; }
        .dismiss-highlight-btn:hover { background-color: #bee3f8; }
        
        .dark-mode .delete-btn { background: #3c2323; color: #e53e3e; }
        .dark-mode .delete-btn:hover { background: #5c2c2c; }
        .dark-mode .dismiss-highlight-btn { background: #2c3a5c; color: #90cdf4; }
        .dark-mode .dismiss-highlight-btn:hover { background: #3b508a; }

        .quote-list { list-style: none; padding: 0; margin: 0; flex-grow: 1; min-height: 50px; }
        
        .quote-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 9px 0; 
            border-bottom: 1px solid var(--border-color); 
            gap: 8px; 
            position: relative;
            transition: background-color 0.5s ease, border-left-color 0.5s ease;
            cursor: grab; 
        }
        .quote-item:active { cursor: grabbing; }
        .quote-item.dragging { opacity: 0.4; background-color: var(--bg-color); border: 1px dashed var(--border-color); }
        .quote-item.drag-over { border-top: 2px solid #3182ce; }

        .dark-mode .quote-item { border-bottom-color: #374151; }
        
        .quote-item.highlight { 
            background-color: var(--highlight-bg); 
            border-left: 4px solid var(--highlight-border); 
            padding-left: 16px; 
            margin-left: -20px; 
            padding-right: 20px; 
            width: calc(100% + 4px); 
        }

        .quote-item.highlight-past { 
            background-color: var(--highlight-past-bg); 
            border-left: 4px solid var(--highlight-past-border); 
            padding-left: 16px; 
            margin-left: -20px; 
            padding-right: 20px; 
            width: calc(100% + 4px); 
        }
        
        .quote-left-container {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0; 
            margin-right: 4px;
            pointer-events: none; 
        }

        .quote-label { font-weight: 500; color: var(--text-color-light); text-transform: capitalize; white-space: nowrap; }
        
        .trend-arrow {
            display: inline-flex; 
            align-items: center;
            justify-content: center; 
            text-align: center;
            width: 45px;            
            height: 28px;           
            border-radius: 6px;
            font-size: 16px;        
            font-weight: 900;       
            font-family: system-ui, -apple-system, sans-serif; 
            letter-spacing: -2px;   
            opacity: 0; 
            transform: scale(1); 
            cursor: default;
            margin-left: 4px;
            line-height: 1; 
            padding-bottom: 2px;
            flex-shrink: 0;
        }
        .trend-arrow.visible { opacity: 1; }
        
        .trend-up { background-color: var(--trend-up-bg); color: var(--trend-up-text); }
        .trend-down { background-color: var(--trend-down-bg); color: var(--trend-down-text); }

        .quote-result { 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            flex-grow: 1; 
            min-width: 0; 
        }
        
        .quote-data { 
            font-weight: 600; 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            justify-content: center;
            font-size: 14px; 
            flex-grow: 1;
            min-width: 0; 
            white-space: nowrap; 
            margin-right: 8px;
        }
        
        .quote-text-wrapper {
            position: relative;
            cursor: pointer;
            padding: 4px 8px; 
            white-space: nowrap; 
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .quote-text-wrapper:hover {
            background-color: rgba(0,0,0,0.05);
        }
        .dark-mode .quote-text-wrapper:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .quote-text { white-space: nowrap; }
        
        .inverse-quote-text {
            font-size: 13px;
            color: var(--text-color-light);
            opacity: 0.8;
            margin-top: 2px;
            padding-right: 8px;
            font-weight: normal;
            min-height: 1.2em; 
            cursor: pointer;
        }
        
        .quote-text.loading-text {
            color: var(--text-color-light);
            font-size: 0.9em;
            font-style: italic;
        }

        .loading-icon {
            display: inline-block;
            animation: spin 1s linear infinite;
            margin-right: 4px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .quote-data.error { color: var(--error-color); }
        
        .quote-actions { display: flex; flex-shrink: 0; margin-left: 0px; align-items: center; gap: 2px; }

        .amount-input {
            background-color: transparent;
            border: 1px solid transparent;
            color: inherit;
            font-family: inherit;
            font-size: 14px; 
            font-weight: 600;
            text-align: right;
            border-radius: 4px;
            padding: 2px 4px;
            transition: border-color 0.2s, background-color 0.2s;
            -moz-appearance: textfield;
            width: 90px;
            flex-shrink: 0; 
            margin-right: 8px;
        }
        .amount-input::-webkit-outer-spin-button, .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .amount-input:hover { border-color: var(--border-color); }
        .amount-input:focus { background-color: var(--bg-color); border-color: #3182ce; outline: none; }

        #add-category-btn, .add-quote-btn { cursor: pointer; text-align: center; border-radius: 8px; padding: 10px; font-weight: 600; transition: background-color 0.2s; }
        #add-category-btn { background-color: #48bb78; color: white; margin-top: 20px; font-size: 18px; padding: 15px; max-width: 450px; display: block; margin-left: auto; margin-right: auto; }
        .add-quote-btn { background-color: transparent; color: var(--text-color-light); border: 1px dashed var(--border-color); margin-top: 10px; }

        #manual-save-btn { 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-weight: 600; 
            font-size: 14px;
            background-color: var(--button-hover-bg);
            color: var(--text-color);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            cursor: pointer;
        }
        #manual-save-btn:hover { background-color: #e2e8f0; transform: translateY(-1px); }
        .dark-mode #manual-save-btn:hover { background-color: #4a5568; }
        
        #manual-save-btn:active { transform: translateY(0); }
        #manual-save-btn:disabled { cursor: default; opacity: 0.7; }
        
        #manual-save-btn.saving { background-color: var(--info-banner-bg); color: var(--info-banner-text); border-color: var(--info-banner-border); }
        #manual-save-btn.success { background-color: #c6f6d5; color: #22543d; border-color: #9ae6b4; }
        .dark-mode #manual-save-btn.success { background-color: #276749; color: #f0fff4; border-color: #2f855a; }
        #manual-save-btn.error { background-color: #fed7d7; color: #822727; border-color: #feb2b2; }
        #quote-run-state-tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 72px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid transparent;
        }
        #quote-run-state-tag.running {
            background-color: #c6f6d5;
            color: #22543d;
            border-color: #9ae6b4;
        }
        #quote-run-state-tag.paused {
            background-color: #fef3c7;
            color: #92400e;
            border-color: #fcd34d;
        }
        .dark-mode #quote-run-state-tag.running {
            background-color: #276749;
            color: #f0fff4;
            border-color: #2f855a;
        }
        .dark-mode #quote-run-state-tag.paused {
            background-color: #744210;
            color: #fef3c7;
            border-color: #b7791f;
        }

        #theme-toggle-btn { width: 36px; height: 36px; font-size: 18px; }
        #global-settings-btn { width: 36px; height: 36px; font-size: 18px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-overlay.visible { display: flex; }
        .modal-box { background: var(--module-bg-color); padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px var(--shadow-color); width: 90%; max-width: 400px; }
        .modal-box h3 { margin-top: 0; color: var(--text-color); } .modal-box .form-group { margin-bottom: 15px; }
        .modal-box label { display: block; margin-bottom: 5px; color: var(--text-color-light); font-weight: 500;}
        .modal-box input, .modal-box select { width: calc(100% - 22px); padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); }
        
        .base-price-info {
            font-size: 0.9em;
            color: var(--text-color-light);
            background-color: var(--button-hover-bg);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px dashed var(--border-color);
        }
        .base-price-value { font-weight: bold; color: var(--text-color); font-family: monospace; font-size: 1.1em; }

        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .modal-buttons button { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
        .modal-buttons button:disabled { background-color: #a0aec0; cursor: not-allowed; }
        #modal-save, #add-quote-save, #add-category-save, #settings-save { background-color: #3182ce; color: white; } 
        #modal-cancel, #add-quote-cancel, #confirm-cancel, #add-category-cancel, #settings-cancel { background-color: var(--button-hover-bg); color: var(--text-color); }
        .quote-settings-actions { display: flex; gap: 10px; margin: 12px 0 6px; }
        .quote-settings-actions button {
            flex: 1;
            padding: 9px 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            background: var(--button-hover-bg);
            color: var(--text-color);
        }
        .quote-settings-actions button:hover { filter: brightness(0.97); }
        #modal-delete-quote { background: #fee2e2; color: #c53030; }
        #modal-delete-quote:hover { background: #fecaca; filter: none; }
        .dark-mode #modal-delete-quote { background: #3c2323; color: #e53e3e; }
        .dark-mode #modal-delete-quote:hover { background: #5c2c2c; }
        .quote-token-addresses {
            margin: 6px 0 12px;
        }
        .quote-token-address-line + .quote-token-address-line {
            margin-top: 8px;
        }
        .quote-token-address-line {
            font-size: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            color: var(--text-color);
            line-height: 1.35;
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 2px;
        }
        .alert-modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 20px;
        }
        .alert-modal-footer .modal-buttons {
            margin-top: 0;
            flex-shrink: 0;
        }
        .alert-modal-footer .quote-settings-actions {
            margin: 0;
            flex: 1;
        }
        .alert-modal-footer .quote-settings-actions button {
            padding: 10px 12px;
        }

        #alert-log-window { position: fixed; bottom: 20px; right: 20px; width: 350px; max-height: 400px; background-color: var(--module-bg-color); border-radius: 12px; box-shadow: 0 10px 30px var(--shadow-color); display: none; flex-direction: column; z-index: 1000; overflow: hidden; resize: both; }
        #alert-log-header { padding: 10px 15px; background-color: #2d3748; color: white; font-weight: bold; cursor: move; user-select: none; }
        .dark-mode #alert-log-header { background-color: #1a202c; }
        #alert-log-content { flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        .log-entry { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        .log-time { font-size: 0.8em; color: var(--text-color-light); display: block; }

        #arb-path-window { position: fixed; bottom: 20px; left: 20px; width: 1080px; height: 330px; background-color: var(--module-bg-color); border-radius: 12px; box-shadow: 0 10px 30px var(--shadow-color); display: flex; flex-direction: column; z-index: 1000; overflow: hidden; resize: both; }
        #arb-path-header { padding: 10px 15px; background-color: #2d3748; color: white; font-weight: bold; cursor: move; user-select: none; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .dark-mode #arb-path-header { background-color: #1a202c; }
        .panel-header-actions { display: flex; align-items: center; gap: 8px; }
        #arb-path-max-btn, #arb-path-min-btn {
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: #fff;
            border-radius: 6px;
            padding: 2px 8px;
            cursor: pointer;
            font-weight: 700;
        }
        #arb-path-max-btn:hover, #arb-path-min-btn:hover { background-color: rgba(255,255,255,0.12); }
        #arb-global-filter-bar { padding: 8px 12px; border-bottom: 1px solid var(--border-color); background-color: rgba(0,0,0,0.015); }
        .dark-mode #arb-global-filter-bar { background-color: rgba(255,255,255,0.02); }
        .arb-global-filter-row { display: flex; gap: 6px; align-items: center; }
        #arb-global-filter-input,
        #arb-global-chain-filter-input {
            flex: 1;
            min-width: 0;
            padding: 4px 6px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: transparent;
            color: inherit;
        }
        #arb-global-filter-clear-btn { padding: 4px 8px; border: 1px solid var(--border-color); border-radius: 6px; background: transparent; color: inherit; cursor: pointer; }
        #arb-global-filter-clear-btn:disabled { opacity: 0.5; cursor: default; }
        #arb-path-content { flex-grow: 1; overflow-y: auto; padding: 12px; font-size: 13px; }
        .arb-path-grid { display: grid; grid-template-columns: repeat(3, minmax(220px, 1fr)); gap: 10px; align-items: start; }
        .arb-column { min-width: 0; }
        .arb-section { border: 1px solid var(--border-color); border-radius: 8px; padding: 8px; margin-bottom: 8px; background-color: rgba(0,0,0,0.01); }
        .dark-mode .arb-section { background-color: rgba(255,255,255,0.02); }
        .arb-section-title { font-weight: 700; margin-bottom: 6px; font-size: 13px; }
        .arb-path-line { margin-bottom: 4px; line-height: 1.35; }
        .arb-opportunity { padding-top: 6px; margin-top: 6px; border-top: 1px dashed var(--border-color); }
        .arb-opportunity:first-of-type { margin-top: 0; padding-top: 0; border-top: none; }
        .arb-opportunity[data-arb-opportunity-id] { cursor: pointer; }
        .arb-opportunity[data-arb-opportunity-id]:hover { background-color: rgba(37, 99, 235, 0.04); }
        .arb-opportunity[data-arb-opportunity-id]:focus { outline: 2px solid #2563eb; outline-offset: 4px; }
        .arb-profit { font-weight: 700; color: var(--trend-up-bg); }
        .arb-profit-neg { color: var(--trend-down-bg); }
        #arb-detail-modal .modal-box {
            width: min(720px, 92vw);
            max-width: none;
            padding: 18px;
            border: 1px solid var(--border-color);
        }
        #arb-detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }
        #arb-detail-header h3 { margin: 0; }
        #arb-detail-subtitle {
            color: var(--text-color-light);
            font-size: 13px;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        #arb-detail-close-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: inherit;
            cursor: pointer;
            font-weight: 600;
        }
        #arb-detail-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .arb-detail-card {
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px;
            background: linear-gradient(180deg, rgba(45,55,72,0.05), rgba(0,0,0,0.015));
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
        }
        .dark-mode .arb-detail-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            box-shadow: none;
        }
        .arb-detail-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .arb-detail-badge {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background-color: #2d3748;
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            box-shadow: inset 0 -1px 0 rgba(255,255,255,0.12);
        }
        .dark-mode .arb-detail-badge {
            background-color: #1a202c;
        }
        .arb-detail-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }
        .arb-detail-input {
            flex: 1;
            min-width: 0;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.01em;
        }
        .arb-detail-stepper {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .arb-detail-step-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--button-hover-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            line-height: 1;
        }
        .arb-detail-step-btn:hover {
            filter: brightness(0.98);
        }
        .arb-detail-path-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 120px;
        }
        .arb-detail-leg {
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border-color);
        }
        .arb-detail-leg:last-child {
            padding-bottom: 0;
            border-bottom: none;
        }
        .arb-detail-leg-line {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            line-height: 1.45;
        }
        .arb-detail-leg-main {
            flex: 1;
            min-width: 0;
        }
        .arb-detail-leg-pair {
            font-weight: 600;
            font-size: 13px;
        }
        .arb-detail-token {
            cursor: pointer;
            text-decoration: underline dotted rgba(45, 55, 72, 0.45);
            text-underline-offset: 2px;
        }
        .arb-detail-token:hover {
            color: #2563eb;
        }
        .dark-mode .arb-detail-token {
            text-decoration-color: rgba(255, 255, 255, 0.35);
        }
        .arb-detail-leg-amount {
            font-weight: 700;
            text-align: right;
            white-space: nowrap;
        }
        .arb-detail-leg-source {
            margin-top: 2px;
            font-size: 11px;
            color: var(--text-color-light);
            opacity: 0.72;
            letter-spacing: 0.01em;
        }
        .arb-detail-summary {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .arb-detail-metric {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background-color: rgba(0,0,0,0.02);
            font-weight: 700;
            line-height: 1.4;
        }
        .dark-mode .arb-detail-metric {
            background-color: rgba(255,255,255,0.03);
        }
        .arb-detail-metric-best {
            background-color: #c6f6d5;
            border-color: #9ae6b4;
            color: #22543d;
        }
        .dark-mode .arb-detail-metric-best {
            background-color: #276749;
            border-color: #2f855a;
            color: #f0fff4;
        }
        .arb-detail-error {
            color: var(--error-color);
            font-size: 12px;
            line-height: 1.4;
        }
        .arb-detail-loading {
            color: var(--text-color-light);
            font-size: 12px;
        }
        @media (max-width: 980px) {
            #arb-detail-grid {
                grid-template-columns: 1fr;
            }
        }

        #calc-window { position: fixed; bottom: 20px; right: 390px; width: 430px; height: 280px; background-color: var(--module-bg-color); border-radius: 12px; box-shadow: 0 10px 30px var(--shadow-color); display: none; flex-direction: column; z-index: 1000; overflow: hidden; resize: both; }
        #calc-header { padding: 10px 15px; background-color: #2d3748; color: white; font-weight: bold; cursor: move; user-select: none; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .dark-mode #calc-header { background-color: #1a202c; }
        #calc-reset-btn, #calc-min-btn {
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: #fff;
            border-radius: 6px;
            padding: 2px 8px;
            cursor: pointer;
            font-weight: 700;
        }
        #calc-reset-btn:hover, #calc-min-btn:hover { background-color: rgba(255,255,255,0.12); }
        #calc-content { flex-grow: 1; overflow-y: auto; padding: 12px; font-size: 13px; }
        .calc-line { margin-bottom: 6px; line-height: 1.35; }
        .calc-footer { margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--border-color); font-weight: 700; }
        .calc-empty { color: var(--text-color-light); }
        
        #audio-notice {
            display: none;
            position: fixed;
            top: 80px; 
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--info-banner-bg);
            color: var(--info-banner-text);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--info-banner-border);
            box-shadow: 0 4px 12px var(--shadow-color);
            z-index: 3000;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }
        
        #global-tooltip {
            display: none;
            position: fixed;
            z-index: 9999;
            background-color: var(--popover-bg);
            color: var(--popover-text);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            pointer-events: none;
            transform: translate(-50%, -100%); 
            margin-top: -8px;
            transition: opacity 0.2s ease;
        }
        #global-tooltip.visible { display: block; }
        #global-tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: var(--popover-bg) transparent transparent transparent;
        }

        #copy-toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--module-bg-color);
            color: var(--text-color);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 10px 30px var(--shadow-color);
            border: 1px solid var(--border-color);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 1200;
        }
        #copy-toast.visible { opacity: 1; }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .checkbox-group input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }
        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div id="global-tooltip"></div>
    <div id="copy-toast"></div>

    <div id="top-bar">
        <div id="top-bar-left">
            <h3 style="margin: 0; color: var(--text-color);">聚合报价看板 4.0</h3>
            <button id="manual-save-btn" title="立即保存当前配置到文件">
                <span>💾</span> <span id="manual-save-text">保存配置</span>
            </button>
            <span id="quote-run-state-tag" class="running">报价中</span>
        </div>
        <div id="top-bar-right">
             <button id="toggle-arb-btn" title="显示/隐藏套利路径">路径</button>
             <button id="toggle-calc-btn" title="显示/隐藏计算器">计算器</button>
             <button id="global-settings-btn" class="icon-btn" title="API 设置">⚙️</button>
             <button id="theme-toggle-btn" class="icon-btn" title="切换深色/浅色模式">🌙</button>
        </div>
    </div>

    <div id="audio-notice">请先与页面交互一次 (例如点击按钮) 以启用声音提醒。</div>

    <div id="dashboard"></div>
    <button id="add-category-btn">+ 添加新分区</button>

    <div id="alert-log-window"><div id="alert-log-header">提醒日志</div><div id="alert-log-content"></div></div>
    <div id="arb-path-window">
        <div id="arb-path-header">
            <span>套利路径</span>
            <div class="panel-header-actions">
                <button id="arb-path-min-btn" title="最小化">－</button>
                <button id="arb-path-max-btn" title="最大化高度">⇵</button>
            </div>
        </div>
        <div id="arb-global-filter-bar">
            <div class="arb-global-filter-row">
                <input id="arb-global-filter-input" type="text" placeholder="代币过滤（空格分隔）">
                <input id="arb-global-chain-filter-input" type="text" placeholder="链过滤（空格分隔，如 Arbitrum）">
                <button id="arb-global-filter-clear-btn" type="button" disabled>清空</button>
            </div>
        </div>
        <div id="arb-path-content">等待数据...</div>
    </div>
    <div class="modal-overlay" id="arb-detail-modal">
        <div class="modal-box">
            <div id="arb-detail-header">
                <h3>套利路径详情</h3>
                <button id="arb-detail-close-btn" type="button">关闭</button>
            </div>
            <div id="arb-detail-subtitle">选择一个套利机会后，可在这里对比不同投入金额的产出。</div>
            <div id="arb-detail-grid"></div>
        </div>
    </div>
    <div id="calc-window">
        <div id="calc-header">
            <span>计算器</span>
            <div class="panel-header-actions">
                <button id="calc-reset-btn" title="清空结果">Reset</button>
                <button id="calc-min-btn" title="最小化">－</button>
            </div>
        </div>
        <div id="calc-content"><div class="calc-empty">点击报价价格后会显示在这里</div></div>
    </div>
    
    <audio id="alert-sound" src="alert.mp3" preload="auto"></audio>
    
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-box">
            <h3>全局 API 速率设置</h3>
            <p style="font-size: 0.9em; color: var(--text-color-light); margin-bottom: 15px;">设置每个数据源的请求间隔 (毫秒/次)。数值越小刷新越快，但过低可能触发 API 限制。</p>
            
            <div class="form-group">
                <label>Kyber (默认 170ms)</label>
                <input type="number" id="setting-kyber-interval" placeholder="170">
            </div>
            <div class="form-group">
                <label>0x (默认 110ms)</label>
                <input type="number" id="setting-zerox-interval" placeholder="110">
            </div>
            <div class="form-group">
                <label>LI.FI (默认 170ms)</label>
                <input type="number" id="setting-lifi-interval" placeholder="170">
            </div>
            <div class="form-group">
                <label>Bybit (默认 1000ms)</label>
                <input type="number" id="setting-bybit-interval" placeholder="1000">
            </div>
            <div class="form-group">
                <label>Solana (默认 3500ms)</label>
                <input type="number" id="setting-solana-interval" placeholder="3500">
            </div>
            <div class="form-group">
                <label>Sui (默认 500ms)</label>
                <input type="number" id="setting-sui-interval" placeholder="500">
            </div>
            <div class="form-group">
                <label>Starknet / Ekubo (默认 1000ms)</label>
                <input type="number" id="setting-starknet-interval" placeholder="1000">
            </div>

            <div class="modal-buttons">
                <button id="settings-cancel">取消</button>
                <button id="settings-save">保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="alert-modal">
        <div class="modal-box">
            <h3 id="modal-title">设置</h3>
            <div id="quote-token-addresses" class="quote-token-addresses" style="display:none;">
                <div id="quote-from-token-line" class="quote-token-address-line"></div>
                <div id="quote-to-token-line" class="quote-token-address-line"></div>
            </div>
            
            <div class="form-group" id="source-select-group" style="display:none;">
                <label>数据源偏好</label>
                <select id="quote-source-pref">
                    <option value="Kyber">Kyber (默认)</option>
                    <option value="Auto">Auto (Kyber -> 0x)</option>
                    <option value="0x">0x</option>
                    <option value="LI.FI">LI.FI</option>
                </select>
                <div style="font-size:0.8em; color:var(--text-color-light); margin-top:4px;">
                    Auto模式失败会自动切换源，可能会导致价格轻微跳动。
                </div>
            </div>

            <div class="checkbox-group" id="inverse-toggle-group">
                <input type="checkbox" id="show-inverse-quote">
                <label for="show-inverse-quote">显示反向报价 (小字号)</label>
            </div>

            <hr style="border:0; border-top:1px solid var(--border-color); margin: 15px 0;">
            
            <div style="margin-bottom:10px; font-weight:bold;">监控与提醒</div>

            <div class="base-price-info">
                当前价格: <span id="alert-current-price-value" class="base-price-value">--</span>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="reset-base-price">
                <label for="reset-base-price">更新基准价格为当前价格</label>
            </div>

            <div class="form-group">
                <label>上涨超过 (%) <span id="alert-up-base-display" style="font-weight: normal; color: var(--text-color-light); font-size: 0.85em; margin-left: 8px;"></span></label>
                <input type="number" id="alert-percent-up" placeholder="例如: 0.1">
            </div>
            <div class="form-group">
                <label>下跌超过 (%) <span id="alert-down-base-display" style="font-weight: normal; color: var(--text-color-light); font-size: 0.85em; margin-left: 8px;"></span></label>
                <input type="number" id="alert-percent-down" placeholder="例如: 0.1">
            </div>
            <div class="form-group"><label>价格高于</label><input type="number" id="alert-target-above" placeholder="例如: 70000"></div>
            <div class="form-group"><label>价格低于</label><input type="number" id="alert-target-below" placeholder="例如: 65000"></div>
            <div class="alert-modal-footer">
                <div class="quote-settings-actions">
                    <button id="modal-swap-quote" type="button">反转价格对</button>
                    <button id="modal-delete-quote" type="button">删除价格对</button>
                </div>
                <div class="modal-buttons">
                    <button id="modal-cancel">取消</button><button id="modal-save">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="add-quote-modal">
        <div class="modal-box">
            <h3>添加新报价</h3>
            <div class="form-group">
                <label for="add-quote-chain">链 / 平台</label>
                <select id="add-quote-chain">
                    <option value="">--请选择--</option>
                    <optgroup label="EVM Chains">
                        <option value="ethereum">Ethereum</option>
                        <option value="bsc">BSC (BNB)</option>
                        <option value="arbitrum">Arbitrum</option>
                        <option value="polygon">Polygon</option>
                        <option value="optimism">Optimism</option>
                        <option value="avalanche">Avalanche</option>
                        <option value="base">Base</option>
                        <option value="linea">Linea</option>
                        <option value="scroll">Scroll</option>
                        <option value="mantle">Mantle</option>
                        <option value="blast">Blast</option>
                        <option value="mode">Mode</option>
                        <option value="sonic">Sonic</option>
                        <option value="berachain">Berachain</option>
                        <option value="ronin">Ronin</option>
                        <option value="unichain">Unichain</option>
                        <option value="hyperevm">HyperEVM</option>
                        <option value="plasma">Plasma</option>
                        <option value="etherlink">Etherlink</option>
                        <option value="monad">Monad</option>
                        <option value="hemi">Hemi</option>
                        <option value="katana">Katana</option>
                    </optgroup>
                    
                    <optgroup label="Solana">
                        <option value="solana">Solana</option>
                    </optgroup>
                    
                    <optgroup label="Sui">
                        <option value="sui">Sui</option>
                    </optgroup>

                    <optgroup label="Starknet">
                        <option value="starknet">Starknet</option>
                    </optgroup>
                    
                    <optgroup label="Bybit">
                        <option value="Bybit">Bybit</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group" id="add-quote-pair-fields" style="display:none;">
                 <label for="add-quote-from">From Token 地址</label>
                 <input type="text" id="add-quote-from" placeholder="0x...">
                 <label for="add-quote-to">To Token 地址</label>
                 <input type="text" id="add-quote-to" placeholder="0x...">
            </div>
             <div class="form-group" id="add-quote-symbol-field" style="display:none;">
                 <label for="add-quote-symbol">交易对</label>
                 <input type="text" id="add-quote-symbol" placeholder="例如: BTCUSDT">
            </div>
            <div class="modal-buttons">
                <button id="add-quote-cancel">取消</button>
                <button id="add-quote-save" disabled>保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-box">
            <h3 id="confirm-title">请确认</h3>
            <p id="confirm-message" style="margin: 20px 0;"></p>
            <div class="modal-buttons">
                <button id="confirm-cancel">取消</button>
                <button id="confirm-ok" class="delete-btn">确定</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="add-category-modal">
        <div class="modal-box">
            <h3>添加新分区</h3>
            <div class="form-group">
                <label for="add-category-name">分区名称</label>
                <input type="text" id="add-category-name" placeholder="例如: 主力监控">
            </div>
            <div class="modal-buttons">
                <button id="add-category-cancel">取消</button>
                <button id="add-category-save">保存</button>
            </div>
        </div>
    </div>

    <script src="arb-paths.js"></script>
    <script src="quote-calculator.js"></script>
    <script src="chain-defaults.js"></script>
    <script src="arb-panel-renderer.js"></script>
    <script src="arb-fixed-utils.js"></script>
    <script src="arb-detail-utils.js"></script>
    <script src="app.js"></script>
</body>
</html>
